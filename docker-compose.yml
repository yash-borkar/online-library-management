services:
  database:
    image: mongo:7
    container_name: database
    hostname: database
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.runCommand({ ping: 1 }).ok",
        ]
      interval: 4s
      timeout: 10s
      retries: 12
      start_period: 15s

  backend:
    image: backend:latest
    build: ./backend
    container_name: backend
    restart: unless-stopped
    # Host port defaults to 14000 so it does not clash with a local process on 4000.
    # Inside the compose network the API is still backend:4000.
    ports:
      - "${BACKEND_PUBLISH:-14000}:4000"
    environment:
      DATABASE_URL: mongodb://database:27017/library?replicaSet=rs0
      MONGO_HOST: database
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-change-this-to-32plus-random-chars!!}
    depends_on:
      database:
        condition: service_healthy

  frontend:
    image: frontend:latest
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:4000
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_INTERNAL_URL: http://backend:4000
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-change-this-to-32plus-random-chars!!}
      COOKIE_SECURE: "false"
    depends_on:
      - backend

volumes:
  mongodata:
